name: Update Wildfire Map

on:
  # Run every 6 hours automatically
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Grant permission to write back to the repo
permissions:
  contents: write

jobs:
  update-map:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: List files (debug)
        run: |
          echo "Files in repo root:"
          ls -la
          echo "Python version:"
          python --version

      - name: Run fire map updater
        run: python update_fire_map.py

      - name: Commit and push if changed
        run: |
          git config user.name "Awayday Fire Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: wildfire data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
